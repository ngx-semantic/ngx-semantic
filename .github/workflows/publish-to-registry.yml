name: Publish to Registry

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      src_changed: ${{ steps.check_changes.outputs.src_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for changes in src directory
        id: check_changes
        run: |
          git fetch origin
          CHANGED_FILES=$(git diff --name-only origin/master...HEAD)
          if echo "$CHANGED_FILES" | grep -q "^src/"; then
            echo "src_changed=true" >> $GITHUB_OUTPUT
          else
            echo "src_changed=false" >> $GITHUB_OUTPUT
          fi
      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Setup Angular
        run: npm install -g @angular/cli@latest
      - name: Install Dependencies
        run: npm install
      - name: Build
        run: npm run build:prod
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: ./dist
          retention-days: 1

  tag:
    needs: build
    if: needs.build.outputs.src_changed == 'true'
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.tag-version.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Tag Version
        id: tag-version
        run: |
          cd src
          NEW_VERSION=$(npm version patch)
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          git config --local user.email "indexz3ro@aol.com"
          git config --local user.name "CI"
          git commit -a -m "ci: version release"
          git tag $NEW_VERSION
      - name: Push Tags to GitHub
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: master
          tags: true

  publish:
    needs: [build, tag]
    if: needs.build.outputs.src_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master
      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: ./dist
      - name: Publish Lib
        run: npm publish ./dist --tag latest --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release:
    needs: [build, tag, publish]
    if: needs.build.outputs.src_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master
      - name: Prerelease from version tag
        id: version_meta
        env:
          TAG: ${{ needs.tag.outputs.new_version }}
        run: |
          V="${TAG#v}"
          L=$(printf '%s' "$V" | tr '[:upper:]' '[:lower:]')
          PRE=false
          if echo "$L" | grep -qE -- '-alpha([.-]|$)|-beta([.-]|$)'; then
            PRE=true
          elif echo "$V" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            PRE=true
          fi
          echo "prerelease=$PRE" >> $GITHUB_OUTPUT
      - name: Create Release
        uses: ncipollo/release-action@v1.14.0
        with:
          tag: ${{ needs.tag.outputs.new_version }}
          prerelease: ${{ steps.version_meta.outputs.prerelease == 'true' }}
          makeLatest: ${{ steps.version_meta.outputs.prerelease != 'true' }}
          generateReleaseNotes: true
