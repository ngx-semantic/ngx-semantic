name: Publish to Registry

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check_changes.outputs.version_changed }}
      new_version: ${{ steps.check_changes.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for version change in lib package
        id: check_changes
        run: |
          git fetch origin
          PREV_VERSION=$(git show origin/master:src/package.json | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])")
          CURR_VERSION=$(python3 -c "import sys,json; print(json.load(open('src/package.json'))['version'])")
          if [ "$PREV_VERSION" != "$CURR_VERSION" ]; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "new_version=v$CURR_VERSION" >> $GITHUB_OUTPUT
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi
      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Setup Angular
        run: npm install -g @angular/cli@latest
      - name: Install Dependencies
        run: npm install
      - name: Build
        run: npm run build:prod
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: ./dist
          retention-days: 1

  tag:
    needs: build
    if: needs.build.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create Tag
        run: |
          git config --local user.email "indexz3ro@aol.com"
          git config --local user.name "CI"
          git tag ${{ needs.build.outputs.new_version }}
      - name: Push Tag to GitHub
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: master
          tags: true

  release:
    needs: [build, tag]
    if: needs.build.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master
      - name: Prerelease from version tag
        id: version_meta
        env:
          TAG: ${{ needs.build.outputs.new_version }}
        run: |
          V="${TAG#v}"
          L=$(printf '%s' "$V" | tr '[:upper:]' '[:lower:]')
          PRE=false
          if echo "$L" | grep -qE -- '-alpha([.-]|$)|-beta([.-]|$)'; then
            PRE=true
          fi
          echo "prerelease=$PRE" >> $GITHUB_OUTPUT
      - name: Create Release
        uses: ncipollo/release-action@v1.14.0
        with:
          tag: ${{ needs.build.outputs.new_version }}
          prerelease: ${{ steps.version_meta.outputs.prerelease == 'true' }}
          makeLatest: ${{ steps.version_meta.outputs.prerelease != 'true' }}
          generateReleaseNotes: true

  publish:
    needs: [build, tag]
    if: needs.build.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master
      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 22.14
          registry-url: 'https://registry.npmjs.org'
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: ./dist
      - name: Publish Lib
        run: npm publish ./dist --provenance --tag latest --access public
